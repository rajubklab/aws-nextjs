name: Build and Push to ECR and Deploy to EKS

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: ${{ vars.AWS_REGION }} # Change to your AWS region.
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }} # Change to your ECR repository name.
  EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME }} # Change to your EKS cluster name.

permissions:
  contents: read
  id-token: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    outputs:
      image-uri: ${{ steps.image.outputs.image-uri }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names "$ECR_REPOSITORY" || \
          aws ecr create-repository --repository-name "$ECR_REPOSITORY"

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Push to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Output image URI
        id: image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "image-uri=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

  update-eks:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: Update image and deploy
        run: |
          # Get container names from the deployment
          CONTAINERS=$(kubectl get deployment nextjs-app -n default -o jsonpath='{.spec.template.spec.containers[*].name}' 2>/dev/null || true)
          if [ -z "$CONTAINERS" ]; then
            echo "No existing containers found in deployment 'nextjs-app' — attempting to apply manifests again and then exit if still missing."
            kubectl apply -f k8s/deployment.yaml -n default || true
            CONTAINERS=$(kubectl get deployment nextjs-app -n default -o jsonpath='{.spec.template.spec.containers[*].name}' 2>/dev/null || true)
            if [ -z "$CONTAINERS" ]; then
              echo "Deployment 'nextjs-app' has no containers; aborting."
              kubectl get deployments -n default || true
              exit 1
            fi
          fi

          # Update image for each container found
          for c in $CONTAINERS; do
            echo "Updating container '$c' image to ${{ needs.build-and-push.outputs.image-uri }}"
            kubectl set image deployment/nextjs-app "$c=${{ needs.build-and-push.outputs.image-uri }}" -n default
          done

          # Wait for rollout
          kubectl rollout status deployment/nextjs-app -n default --timeout=5m
