apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextjs-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nextjs-app
  template:
    metadata:
      labels:
        app: nextjs-app
    spec:
      containers:
        - name: nextjs-app
          image: 767469526309.dkr.ecr.ap-south-2.amazonaws.com/aws-nextjs:latest
          ports:
            - containerPort: 3000
